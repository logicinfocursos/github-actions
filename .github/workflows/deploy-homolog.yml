name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      # 1. Baixa o código com o histórico completo para o caso de precisar de rollback
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. CRIAÇÃO DO .ENV: Injeta chaves secretas em um arquivo real no seu PC
      # Nota: Sem espaços entre o segredo e o caractere '>' para o Windows não criar espaços falsos.
      - name: Criar arquivo .env dinamicamente
        shell: cmd
        run: |
          echo NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}>.env
          echo DATABASE_URL=${{ secrets.DATABASE_URL }}>>.env
          echo NODE_ENV=production>>.env

      # 3. Atualiza o container (o Docker Compose lê o arquivo .env automaticamente)
      # Ao usar variáveis em produção, utilize chaves fortes e siga as boas práticas de segurança.
      - name: Atualizar Container Docker Local
        shell: cmd
        run: docker compose up -d --build
      
      # 4. Pausa de 10 segundos para o Next.js inicializar na porta 3333
      - name: Aguardar inicialização do sistema na porta 3333
        shell: cmd
        run: ping 127.0.0.1 -n 11 > nul

      # 5. Instala as dependências do projeto na máquina do Runner
      - name: Instalar dependências de teste
        shell: cmd
        run: npm ci

      # 6. Garante os navegadores do Playwright instalados no Windows
      - name: Instalar Navegadores do Playwright
        shell: cmd
        run: npx playwright install --with-deps

      # 7. Executa a bateria de testes automatizados
      - name: Executar Testes do Playwright
        shell: cmd
        run: npx playwright test

      # 8. ARTEFATOS: Salva o relatório e as screenshots (Roda independente de passar ou falhar)
      - name: Upload do Relatório e Evidências do Playwright
        uses: actions/upload-artifact@v4
        if: always() # <--- ISSO GARANTE QUE O PRINT VAI SUBIR MESMO SE O TESTE QUEBRAR!
        with:
          name: evidencias-playwright-homolog
          path: playwright-report/
          retention-days: 7

      # 9. AUTO-ROLLBACK: Só é ativado se o passo 7 (testes) falhar
      - name: Erro detectado! Executando Rollback Automático
        if: failure()
        shell: cmd
        run: |
          echo "========================================================="
          echo " ALERTA: Testes falharam! Desfazendo alteracoes na homolog"
          echo "========================================================="
          git checkout HEAD~1
          docker compose up -d --build

      # 10. NOTIFICAÇÃO TELEGRAM: Versão Aprimorada com Proteção de Codificação (UTF-8) e Hiperlink
      - name: Enviar notificação para o Telegram
        if: always() 
        shell: powershell
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Passar os textos pelo 'env' do GitHub blinda os emojis e acentos contra o erro de conversão do Windows
          TXT_HEADER: "🚀 <b>Status do Pipeline de Homologação</b>"
          TXT_REPO: "• <b>Repositório:</b> ${{ github.repository }}"
          TXT_COMMIT: "• <b>Commit:</b> <code>${{ github.event.head_commit.message }}</code>"
          TXT_AUTHOR: "• <b>Autor:</b> ${{ github.actor }}"
          TXT_STATUS: "• <b>Resultado Final:</b> ${{ job.status == 'success' && '✅ SUCESSO (O sistema está online!)' || '❌ FALHOU (Rollback executado)' }}"
          TXT_LINK: "📢 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Clique aqui para ver o relatório e evidências</a>"
        run: |
          # Une as variáveis de ambiente que o GitHub injetou de forma limpa
          $msg = @"
          $env:TXT_HEADER
          
          $env:TXT_REPO
          $env:TXT_COMMIT
          $env:TXT_AUTHOR
          $env:TXT_STATUS
          
          $env:TXT_LINK
          "@

          # Monta o objeto JSON de envio
          $payload = @{
              chat_id = $env:TELEGRAM_CHAT_ID
              text = $msg
              parse_mode = "HTML"
          } | ConvertTo-Json -Compress

          # Transforma em bytes usando UTF-8 estrito
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($payload)
          
          # Dispara para os servidores do Telegram
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TELEGRAM_TOKEN/sendMessage" -Method Post -Body $bytes -ContentType "application/json; charset=utf-8"