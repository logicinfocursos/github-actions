name: Deploy Homolog

on:
  push:
    branches:
      - homolog

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      # 1. Baixa o código (com fetch-depth: 0 para permitir que o Git volte atrás se falhar)
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Atualiza o container com o código novo que você acabou de enviar
      - name: Atualizar Container Docker Local
        shell: cmd
        run: docker compose up -d --build
      
      # 3. Dá uma pausa para o Next.js carregar dentro do container antes de testar
      - name: Aguardar inicialização do sistema
        shell: cmd
        run: timeout /t 10 /nobreak > nul

      # 4. Instala as dependências do projeto (onde deve estar o Playwright)
      - name: Instalar dependências de teste
        shell: cmd
        run: npm ci

      # 5. Garante que os navegadores do Playwright estão instalados no seu Windows
      # Nota: Isso só vai demorar na primeira vez. Depois ele usará o cache local do seu PC.
      - name: Instalar Navegadores do Playwright
        shell: cmd
        run: npx playwright install --with-deps

      # 6. Executa os testes automatizados
      - name: Executar Testes do Playwright
        shell: cmd
        run: npx playwright test

      # 7. SE OS TESTES FALHAREM: O GitHub Actions ativa este passo automaticamente
      - name: Erro detectado! Executando Rollback Automático
        if: failure()
        shell: cmd
        run: |
          echo "========================================================="
          echo " ALERTA: Testes falharam! Desfazendo alteracoes na homolog"
          echo "========================================================="
          rem Volta o código para o commit imediatamente anterior
          git checkout HEAD~1
          rem Reconstrói o Docker com a versão estável antiga
          docker compose up -d --build
          rem Força o workflow a terminar com status de erro para você ver o sinal vermelho no GitHub
          exit 1